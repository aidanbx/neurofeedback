<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IronBCI</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="stylesheet" href="/static/program_view/programs.css" />
  <link rel="stylesheet" href="/static/session_view/sessions.css" />
</head>
<body>
<div id="app">

  <!-- ── Icon strip ─────────────────────────────────────────────────────── -->
  <nav id="iconStrip">
    <button class="strip-btn" id="gearBtn" title="Settings">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
    <button class="strip-btn" id="brainBtn" title="Programs">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round">
        <path d="M8 14v-3"/>
        <path d="M5.5 11C4 10.7 3 9.5 3 8c0-.8.3-1.4.8-1.9C3.3 5.7 3 5.1 3 4.4A2.2 2.2 0 0 1 5.2 2.2c.4 0 .8.1 1.1.3A2 2 0 0 1 8 2c.7 0 1.3.2 1.8.5.3-.2.7-.3 1.1-.3A2.2 2.2 0 0 1 13 4.4c0 .7-.3 1.3-.8 1.7.5.5.8 1.1.8 1.9 0 1.5-1 2.7-2.5 3"/>
        <path d="M5.5 11C5.5 12.4 6.6 13.5 8 13.5s2.5-1.1 2.5-2.5"/>
        <path d="M5.2 7c.6-.4 1.4-.4 1.8 0M9 7c.6-.4 1.4-.4 1.8 0"/>
      </svg>
    </button>
    <button class="strip-btn" id="historyBtn" title="Sessions">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M2.2 5.8A6 6 0 1 1 2 8.2"/>
        <polyline points="2,2.2 2,5.8 5.6,5.8"/>
        <polyline points="8,4.5 8,8.2 10.5,9.8"/>
      </svg>
    </button>
  </nav>

  <!-- ── Slide panel (settings or program list) ─────────────────────────── -->
  <div id="slidePanel" class="slide-panel closed">
    <div id="settingsContent" class="slide-content" style="display:none">
      <div class="slide-heading">Settings</div>
      <div class="slide-section">
        <button id="connectBtn" class="btn-primary">Connect</button>
        <button id="testModeBtn" class="btn-secondary" style="margin-top:6px">Test Mode</button>
      </div>
      <div class="slide-section">
        <div class="slide-label">Channel</div>
        <div id="channelBtns"></div>
      </div>
      <div class="slide-footer">
        <div id="connState" class="conn-badge disconnected">disconnected</div>
        <div id="statusMsg">Ready</div>
      </div>
    </div>
    <div id="programsContent" class="slide-content" style="display:none">
      <div class="slide-heading">Programs</div>
      <span id="nfHostStatus" class="nf-status uncalibrated">Loading…</span>
      <!-- program list appended by app.js -->
    </div>
  </div>

  <!-- ── Main content ────────────────────────────────────────────────────── -->
  <main id="main">
    <div id="trainingPanel"></div>

    <div id="sessionsPanel" style="display:none;flex-direction:column;flex:1;padding:8px;overflow:hidden;">
      <div id="sessionsBody" class="sessions-body" style="flex:1;min-height:0;">
        <div class="sessions-list-col">
          <div class="sessions-list-toolbar">
            <button id="sessionsSelectBtn" class="btn-tiny">Select</button>
            <button id="sessionsArchiveBtn" class="btn-tiny btn-destructive" style="display:none" disabled>Archive (0)</button>
          </div>
          <div id="sessionsList" class="sessions-list"></div>
        </div>
        <div id="sessionsDetailView" class="sessions-detail-view">
          <div class="sessions-detail-placeholder">Select a session to view details.</div>
        </div>
      </div>
    </div>
  </main>

</div>
<script src="/static/audio/engine.js"></script>
<script src="/static/program_view/host.js"></script>
<script src="/static/app.js"></script>
<script src="/static/session_view/sessions.js"></script>
</body>
</html>
